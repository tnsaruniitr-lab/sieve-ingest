# Auto-deploy to Railway on every push to main.
#
# The sieve-ingest Railway service is a cron job deployed by CLI image upload
# (not GitHub-linked — Railway's serviceConnect API rejects project tokens),
# so without this workflow, merges to main silently never reach production:
# the weekly cron keeps running the stale image. RAILWAY_TOKEN is a
# project-scoped token (least privilege) stored as an Actions secret.
name: Deploy to Railway
on:
  push:
    branches: [main]

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy current main to the sieve-ingest service
        run: railway up --service sieve-ingest --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
